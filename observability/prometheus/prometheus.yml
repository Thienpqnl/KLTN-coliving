global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: coliving-services
    metrics_path: /metrics
    static_configs:
      - targets:
          - identity-service:4001
          - property-service:4002
          - rental-service:4003
          - community-service:4004
          - preference-service:4005
          - ai-service:8000

  - job_name: rabbitmq
    static_configs:
      - targets: [rabbitmq:15692]

  - job_name: kong
    metrics_path: /metrics
    static_configs:
      - targets: [kong:8001]
