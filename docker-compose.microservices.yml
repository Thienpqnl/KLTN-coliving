services:
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-coliving}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-coliving-dev}
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  identity-service:
    build:
      context: .
      dockerfile: services/identity-service/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL}
      IDENTITY_DATABASE_URL: ${IDENTITY_DATABASE_URL:-}
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN}
      PROPERTY_SERVICE_URL: http://property-service:4002
      RENTAL_SERVICE_URL: http://rental-service:4003
      COMMUNITY_SERVICE_URL: http://community-service:4004
      PREFERENCE_SERVICE_URL: http://preference-service:4005
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-coliving}:${RABBITMQ_PASSWORD:-coliving-dev}@rabbitmq:5672
      RABBITMQ_EXCHANGE: ${RABBITMQ_EXCHANGE:-coliving.events}
      MICROSERVICE_TIMEOUT_MS: ${MICROSERVICE_TIMEOUT_MS:-3000}
      PORT: 4001
    ports:
      - "4001:4001"
    depends_on:
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4001/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  property-service:
    build:
      context: .
      dockerfile: services/property-service/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL}
      PROPERTY_DATABASE_URL: ${PROPERTY_DATABASE_URL:-}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN}
      IDENTITY_SERVICE_URL: http://identity-service:4001
      COMMUNITY_SERVICE_URL: http://community-service:4004
      RENTAL_SERVICE_URL: http://rental-service:4003
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-coliving}:${RABBITMQ_PASSWORD:-coliving-dev}@rabbitmq:5672
      RABBITMQ_EXCHANGE: ${RABBITMQ_EXCHANGE:-coliving.events}
      OUTBOX_POLL_INTERVAL_MS: ${OUTBOX_POLL_INTERVAL_MS:-1000}
      MICROSERVICE_TIMEOUT_MS: ${MICROSERVICE_TIMEOUT_MS:-3000}
      PORT: 4002
    ports:
      - "4002:4002"
    depends_on:
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4002/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  rental-service:
    build:
      context: .
      dockerfile: services/rental-service/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL}
      RENTAL_DATABASE_URL: ${RENTAL_DATABASE_URL:-}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN}
      IDENTITY_SERVICE_URL: http://identity-service:4001
      PROPERTY_SERVICE_URL: http://property-service:4002
      AI_SERVICE_URL: http://ai-service:8000
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-coliving}:${RABBITMQ_PASSWORD:-coliving-dev}@rabbitmq:5672
      RABBITMQ_EXCHANGE: ${RABBITMQ_EXCHANGE:-coliving.events}
      OUTBOX_POLL_INTERVAL_MS: ${OUTBOX_POLL_INTERVAL_MS:-1000}
      MICROSERVICE_TIMEOUT_MS: ${MICROSERVICE_TIMEOUT_MS:-3000}
      PORT: 4003
    ports:
      - "4003:4003"
    depends_on:
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4003/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  community-service:
    build:
      context: .
      dockerfile: services/community-service/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL}
      COMMUNITY_DATABASE_URL: ${COMMUNITY_DATABASE_URL:-}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN}
      IDENTITY_SERVICE_URL: http://identity-service:4001
      PROPERTY_SERVICE_URL: http://property-service:4002
      RENTAL_SERVICE_URL: http://rental-service:4003
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-coliving}:${RABBITMQ_PASSWORD:-coliving-dev}@rabbitmq:5672
      RABBITMQ_EXCHANGE: ${RABBITMQ_EXCHANGE:-coliving.events}
      OUTBOX_POLL_INTERVAL_MS: ${OUTBOX_POLL_INTERVAL_MS:-1000}
      MICROSERVICE_TIMEOUT_MS: ${MICROSERVICE_TIMEOUT_MS:-3000}
      PORT: 4004
    ports:
      - "4004:4004"
    depends_on:
      rabbitmq:
        condition: service_healthy
      property-service:
        condition: service_healthy
      rental-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4004/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  preference-service:
    build:
      context: .
      dockerfile: services/preference-service/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL}
      PREFERENCE_DATABASE_URL: ${PREFERENCE_DATABASE_URL:-}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN}
      PORT: 4005
    ports:
      - "4005:4005"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4005/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  ai-service:
    build:
      context: .
      dockerfile: ai/Dockerfile
    env_file:
      - ai/.env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      USE_SERVICE_SCHEMAS: ${USE_SERVICE_SCHEMAS:-false}
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
