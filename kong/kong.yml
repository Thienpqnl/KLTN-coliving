_format_version: "3.0"
_transform: true

services:
  - name: coliving-api-gateway
    url: http://api-gateway:4000
    connect_timeout: 5000
    read_timeout: 10000
    write_timeout: 10000
    retries: 1
    routes:
      - name: coliving-service-routes
        paths:
          - /v1/services
        strip_path: false
        preserve_host: false
      - name: coliving-gateway-health
        paths:
          - /health
        strip_path: false
        preserve_host: false

plugins:
  - name: correlation-id
    config:
      header_name: x-correlation-id
      generator: uuid
      echo_downstream: true

  - name: rate-limiting
    config:
      minute: 600
      limit_by: ip
      policy: local
      fault_tolerant: true
      hide_client_headers: false

  - name: request-size-limiting
    config:
      allowed_payload_size: 10
      size_unit: megabytes
      require_content_length: false

  - name: prometheus
    config:
      status_code_metrics: true
      latency_metrics: true
      bandwidth_metrics: true
      upstream_health_metrics: true
